<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jarvis Widget</title>
    <style>
        body { background: #000; color: #00d4ff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        .circle { 
            position: relative; border: 4px solid #00d4ff; border-radius: 50%; 
            width: 220px; height: 220px; box-shadow: 0 0 30px #00d4ff; 
            display: flex; justify-content: center; align-items: center; 
            font-weight: bold; transition: all 0.2s; text-align: center; 
            font-size: 24px; letter-spacing: 2px;
        }

        /* --- VIBRATION EFFECT --- */
        .vibrate {
            animation: pulse 0.6s infinite;
            border-color: #00fbff;
            box-shadow: 0 0 60px #00fbff, inset 0 0 25px #00fbff;
            text-shadow: 0 0 10px #00fbff;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="circle" id="circle">JARVIS</div>

    <script>
        const circle = document.getElementById('circle');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.continuous = false;

        async function startJarvis() {
            try { 
                recognition.start(); 
                circle.innerText = "JARVIS"; 
            } catch (e) {}
        }

        recognition.onresult = async (event) => {
            // Server kitta Jarvis pesuraara-nu check pannuvom
            const response = await fetch(`http://localhost:3000/status`);
            const status = await response.json();
            
            if (status.speaking) {
                circle.classList.add('vibrate'); // Pesumbodhu vibrate aaganum
                return;
            } else {
                circle.classList.remove('vibrate');
            }

            const command = event.results[0][0].transcript.toLowerCase().trim();
            console.log("Heard: " + command);

            if (command === "jarvis" || command === "hey jarvis") {
                fetch(`http://localhost:3000/wake`);
                circle.innerText = "YES SIR"; 
                circle.classList.add('vibrate'); 
                setTimeout(() => { 
                    circle.innerText = "JARVIS"; 
                    circle.classList.remove('vibrate');
                }, 3000);
                return;
            }

            // Command process aagumbodhum chinna vibration
            circle.classList.add('vibrate');
            fetch(`http://localhost:3000/command?q=${encodeURIComponent(command)}`);
            setTimeout(() => { circle.classList.remove('vibrate'); }, 4000);
        };

        // Automatic state check to keep vibration alive while Jarvis speaks
        setInterval(async () => {
            const response = await fetch(`http://localhost:3000/status`);
            const status = await response.json();
            if (status.speaking) {
                circle.classList.add('vibrate');
                if(circle.innerText === "JARVIS") circle.innerText = "SPEAKING";
            } else {
                if(circle.innerText === "SPEAKING") circle.innerText = "JARVIS";
                circle.classList.remove('vibrate');
            }
        }, 500);

        recognition.onend = () => { startJarvis(); };
        recognition.onerror = () => { setTimeout(startJarvis, 1000); };
        
        startJarvis();
    </script>
</body>
</html>
